name: Deploy to Synology

on:
  push:
    branches: [main, master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTH_KEY }}

      - name: Load SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_KEY }}

      - name: Add Synology to known hosts
        run: ssh-keyscan -H ${{ secrets.SYNOLOGY_TAILSCALE_HOST }} >> ~/.ssh/known_hosts

      - name: Test SSH connection
        run: ssh paullesurf@${{ secrets.SYNOLOGY_TAILSCALE_HOST }} 'echo "SSH OK" && which docker && id'

      - name: Sync code to Synology
        run: |
          tar czf - \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.next' \
            --exclude='Exports' \
            . | ssh paullesurf@${{ secrets.SYNOLOGY_TAILSCALE_HOST }} \
              'mkdir -p /volume1/docker/rotaflow && cd /volume1/docker/rotaflow && tar xzf - 2>&1 | grep -v "Cannot change mode" || true'

      - name: Rebuild and restart Docker container
        run: |
          ssh paullesurf@${{ secrets.SYNOLOGY_TAILSCALE_HOST }} \
            'cd /volume1/docker/rotaflow && sudo /usr/local/bin/docker compose down && sudo /usr/local/bin/docker compose up -d --build'
