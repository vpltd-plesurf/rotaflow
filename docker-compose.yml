version: '3.8'

services:
  rotaflow:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rotaflow
    restart: always
    ports:
      - "3004:3000"
    environment:
      NODE_ENV: production
    env_file:
      - .env.local
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/login', (r) => { if (r.statusCode >= 400) process.exit(1) })"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  keep-alive:
    image: alpine:3.20
    container_name: rotaflow-keep-alive
    restart: always
    volumes:
      - ./scripts/keep-alive.sh:/keep-alive.sh:ro
    env_file:
      - .env.local
    # Run every 3 days: sleep 259200s = 72 hours
    entrypoint: /bin/sh
    command:
      - -c
      - |
        apk add --no-cache curl >/dev/null 2>&1
        echo "Keep-alive started — pinging Supabase every 3 days"
        while true; do
          /bin/sh /keep-alive.sh
          sleep 259200
        done
